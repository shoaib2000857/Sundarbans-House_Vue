<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sundarbans — Member Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #080a08;
      --deep: #0d110d;
      --forest: #1a2e1a;
      --green: #2d5a2d;
      --emerald: #3d7a3d;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5f0e8;
      --muted: rgba(245,240,232,0.45);
      --subtle: rgba(245,240,232,0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* ── CANVAS BACKGROUND ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── GRAIN OVERLAY ── */
    .grain {
      position: fixed;
      inset: -200%;
      width: 400%;
      height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.04;
      animation: grain-drift 8s steps(10) infinite;
      z-index: 1;
      pointer-events: none;
    }
    @keyframes grain-drift {
      0%,100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-3%); }
      20% { transform: translate(-5%,2%); }
      30% { transform: translate(3%,-4%); }
      40% { transform: translate(-4%,5%); }
      50% { transform: translate(-1%,-2%); }
      60% { transform: translate(4%,3%); }
      70% { transform: translate(3%,1%); }
      80% { transform: translate(-3%,4%); }
      90% { transform: translate(2%,-3%); }
    }

    /* ── LAYOUT ── */
    .layout {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 70px;
      position: relative;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      right: 0; top: 10%; bottom: 10%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.3), transparent);
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 70px;
      opacity: 0;
      transform: translateY(-20px);
      animation: slide-in 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }
    .brand-icon {
      width: 40px; height: 40px;
      border: 1px solid rgba(201,168,76,0.5);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .brand-name {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Heading */
    .heading-block {
      margin-bottom: 52px;
      opacity: 0;
      transform: translateY(30px);
      animation: slide-in 0.9s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
    }
    .heading-label {
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .heading-label::before {
      content: '';
      display: block;
      width: 30px; height: 1px;
      background: var(--gold);
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(48px, 5.5vw, 72px);
      line-height: 1.05;
      color: var(--cream);
    }
    h1 em {
      font-style: italic;
      color: var(--gold-light);
    }
    .sub-text {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }

    /* Form */
    .form-block {
      opacity: 0;
      transform: translateY(30px);
      animation: slide-in 0.9s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    .input-wrapper label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 16px 20px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--cream);
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      letter-spacing: 0.01em;
    }
    .input-field::placeholder { color: rgba(245,240,232,0.2); }
    .input-field:focus {
      border-color: rgba(201,168,76,0.5);
      background: rgba(201,168,76,0.04);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08), inset 0 0 20px rgba(201,168,76,0.03);
    }

    /* Button */
    .login-btn {
      width: 100%;
      padding: 18px 32px;
      background: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 4px;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }
    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(201,168,76,0.35); }
    .login-btn:hover::before { transform: translateX(100%); }
    .login-btn:active { transform: translateY(0); }
    .login-btn.loading { pointer-events: none; opacity: 0.7; }

    /* Message */
    .message {
      margin-top: 16px;
      font-size: 13px;
      min-height: 20px;
      transition: all 0.3s;
    }
    .message.error { color: #e07070; }
    .message.success { color: #7dba7d; }

    /* Footer */
    .footer-text {
      margin-top: 60px;
      font-size: 12px;
      color: rgba(245,240,232,0.2);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: slide-in 0.9s cubic-bezier(0.16,1,0.3,1) 0.9s forwards;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
      overflow: hidden;
    }

    /* Animated badge */
    .badge-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 340px; height: 340px;
      opacity: 0;
      animation: fade-up 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
    }
    .badge-ring svg {
      width: 100%; height: 100%;
      animation: slow-spin 30s linear infinite;
    }
    .badge-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .badge-icon {
      font-size: 64px;
      display: block;
      animation: float 4s ease-in-out infinite;
    }
    .badge-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 12px;
    }

    /* Floating orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(45,90,45,0.4), transparent);
      top: -100px; right: -80px;
      animation: orb-drift 12s ease-in-out infinite;
    }
    .orb-2 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(201,168,76,0.15), transparent);
      bottom: 100px; right: 120px;
      animation: orb-drift 9s ease-in-out infinite 3s;
    }

    /* Info cards at bottom */
    .info-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      opacity: 0;
      animation: slide-in 1s cubic-bezier(0.16,1,0.3,1) 1s forwards;
    }
    .info-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 20px;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s, background 0.3s;
    }
    .info-card:hover {
      border-color: rgba(201,168,76,0.25);
      background: rgba(201,168,76,0.04);
    }
    .info-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: var(--gold-light);
      line-height: 1;
    }
    .info-card-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── ANIMATIONS ── */
    @keyframes slide-in {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-up {
      to { opacity: 1; }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    @keyframes slow-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes orb-drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-30px,20px) scale(1.1); }
      66% { transform: translate(20px,-15px) scale(0.95); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .right-panel { display: none; }
      .left-panel { padding: 50px 36px; overflow-y: auto; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grain"></div>

<div class="layout">

  


    

    

    <div class="heading-block">
      <div class="heading-label">Member Portal</div>
      <h1>Welcome<br><em>back.</em></h1>
      <p class="sub-text">Access the Sundarbans House community.<br>Exclusive to IIT Madras BS Programme members.</p>
    </div>

    <div class="form-block">
      <div class="input-wrapper">
        <label>IITM Email Address</label>
        <input
          type="email"
          id="email"
          class="input-field"
          placeholder="yourroll@ds.study.iitm.ac.in"
          autocomplete="email"
        >
      </div>

      <button class="login-btn" onclick="login()" id="loginBtn">
        Enter the Lounge
      </button>

      <p id="message" class="message"></p>
    </div>

    <p class="footer-text">Sundarbans House · IIT Madras BS Programme · Est. 2021</p>
  </div>

  <!-- RIGHT: VISUAL -->
  <div class="right-panel">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="badge-ring">
      <svg viewBox="0 0 340 340" fill="none">
        <circle cx="170" cy="170" r="160" stroke="rgba(201,168,76,0.15)" stroke-width="1" stroke-dasharray="6 10"/>
        <circle cx="170" cy="170" r="140" stroke="rgba(201,168,76,0.08)" stroke-width="1"/>
        <circle cx="170" cy="170" r="120" stroke="rgba(201,168,76,0.2)" stroke-width="0.5" stroke-dasharray="3 6"/>
        <text font-family="'Outfit', sans-serif" font-size="9" fill="rgba(201,168,76,0.6)" letter-spacing="8">
          <textPath href="#ring-path">
            SUNDARBANS HOUSE · IIT MADRAS · EXCLUSIVE MEMBERS PORTAL · 
          </textPath>
        </text>
        <defs>
          <path id="ring-path" d="M 170,170 m -150,0 a 150,150 0 1,1 300,0 a 150,150 0 1,1 -300,0"/>
        </defs>
      </svg>
      <div class="badge-center">
        <span class="badge-icon">🌿</span>
        <div class="badge-title">Members Lounge</div>
      </div>
    </div>

    <div class="info-cards">
      <div class="info-card">
        <div class="info-card-num">2K+</div>
        <div class="info-card-label">Active Members</div>
      </div>
      <div class="info-card">
        <div class="info-card-num">5</div>
        <div class="info-card-label">Weekly Events</div>
      </div>
      <div class="info-card">
        <div class="info-card-num">Daily</div>
        <div class="info-card-label">Reading Lounge</div>
      </div>
      <div class="info-card">
        <div class="info-card-num">∞</div>
        <div class="info-card-label">Community Access</div>
      </div>
    </div>
  </div>

</div>

<script>
  /* ── CANVAS PARTICLES ── */
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = [];
    const count = Math.floor((W * H) / 18000);
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.3,
        vx: (Math.random() - 0.5) * 0.15,
        vy: -Math.random() * 0.2 - 0.05,
        alpha: Math.random() * 0.5 + 0.1,
        color: Math.random() > 0.6 ? '201,168,76' : '61,122,61'
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
    });
    requestAnimationFrame(drawParticles);
  }

  resize();
  initParticles();
  drawParticles();
  window.addEventListener('resize', () => { resize(); initParticles(); });

  /* ── LOGIN LOGIC ── */
  const VALID_DOMAINS = ['@ds.study.iitm.ac.in', '@es.study.iitm.ac.in'];

  async function login() {
    const emailInput = document.getElementById('email');
    const message = document.getElementById('message');
    const btn = document.getElementById('loginBtn');
    const email = emailInput.value.trim().toLowerCase();

    message.className = 'message';
    message.innerText = '';

    if (!email) {
      showMsg('Please enter your IITM email address.', 'error');
      shake(emailInput);
      return;
    }

    const validDomain = VALID_DOMAINS.some(d => email.endsWith(d));
    if (!validDomain) {
      showMsg('Only IITM BS Programme emails are allowed.', 'error');
      shake(emailInput);
      return;
    }

    btn.classList.add('loading');
    btn.innerText = 'Verifying…';

    try {
      const res = await fetch('members.json');
      const data = await res.json();

      if (data.members.includes(email)) {
        localStorage.setItem('houseMember', email);
        showMsg('Access granted. Entering lounge…', 'success');
        btn.innerText = '✓ Welcome';
        setTimeout(() => {
          document.body.style.opacity = '0';
          document.body.style.transition = 'opacity 0.6s';
          setTimeout(() => window.location.href = 'members.html', 600);
        }, 800);
      } else {
        showMsg('You are not registered in Sundarbans House.', 'error');
        shake(emailInput);
        btn.classList.remove('loading');
        btn.innerText = 'Enter the Lounge';
      }
    } catch (err) {
      showMsg('Connection error. Please try again.', 'error');
      btn.classList.remove('loading');
      btn.innerText = 'Enter the Lounge';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('message');
    el.innerText = text;
    el.className = 'message ' + type;
  }

  function shake(el) {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake 0.4s ease';
    setTimeout(() => el.style.animation = '', 400);
  }

  // Enter key support
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  // Page fade-in
  document.body.style.opacity = '0';
  document.body.style.transition = 'opacity 0.5s';
  requestAnimationFrame(() => { document.body.style.opacity = '1'; });
</script>
<style>
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}
</style>
</body>
</html>
